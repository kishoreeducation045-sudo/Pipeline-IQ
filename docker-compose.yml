services:
  backend:
    build: ./backend
    container_name: pipelineiq-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - SQLITE_PATH=/data/pipelineiq.db
      - CHROMA_PATH=/data/chroma
      - CORS_ORIGINS=["http://localhost:5173", "http://localhost:5174"]
    volumes:
      - ./data:/data
    restart: unless-stopped
